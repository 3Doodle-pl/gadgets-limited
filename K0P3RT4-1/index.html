<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3Doodle</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:#1a1a1a;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:Arial,sans-serif;
  padding:16px;
}

.wrap{
  width:100%;
  max-width:480px;
  text-align:center;
}

video{
  width:100%;
  height:auto;
  display:block;
  border-radius:12px;
}

p{
  color:#f5f2ec;
  font-weight:bold;
  margin-top:1.25rem;
  font-size:clamp(16px,4vw,18px);
  line-height:1.5;
}

.highlight{
  color:#f5f2ec;
  text-decoration:underline;
  font-weight:bold;
  cursor:pointer;
}

.highlight:visited{
  color:#f5f2ec;
}
}

p span{
  display:block;
  color:#999;
  font-size:clamp(13px,3.5vw,15px);
  font-weight:normal;
  margin-top:6px;
}

p span a{
  color:#999;
}

@media (max-width:480px){
  .wrap{max-width:100%;}
  video{border-radius:10px;}
}
</style>
</head>
<body>

<div class="wrap">
  <video id="promoVideo" autoplay muted loop playsinline webkit-playsinline>
    <source src="magnet3Doodle.mp4" type="video/mp4">
  </video>

<p>
  Zdobądź ten
  <a href="#"
   class="highlight"
   onclick="
     navigator.clipboard.writeText('Mój tajny kod: K0P3RT4-1').then(() => {
       if (confirm('Twój tajny kod został skopiowany do schowka. Czy chcesz otworzyć Instagram żeby go użyć?')) {
         window.open('https://instagram.com/3doodle_pl/', '_blank');
       }
     });
     return false;
   ">
   Magnes</a> od 25.07

  <span>
    <a href="https://instagram.com/3doodle_pl/" target="_blank" rel="noopener noreferrer">
      @3doodle_pl
    </a>
  </span>
</p>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const video = document.getElementById("promoVideo");
  video.muted = true;

  const playPromise = video.play();
  if (playPromise !== undefined) {
    playPromise.catch(() => {
      document.addEventListener("touchstart", () => video.play(), { once: true });
    });
  }
});
</script>

</body>
</html>
