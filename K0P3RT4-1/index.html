<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3Doodle</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a1a;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Arial, sans-serif;
  }
  .wrap {
    max-width: 480px;
    width: 100%;
    text-align: center;
  }
  video {
    width: 100%;
    border-radius: 12px;
    display: block;
  }
  p {
    color: #f5f2ec;
    font-weight: bold;
    margin-top: 1.25rem;
    font-size: 18px;
    line-height: 1.5;
  }
  p span {
    display: block;
    color: #999;
    font-size: 15px;
    font-weight: normal;
    margin-top: 6px;
  }
</style>
</head>
<body>
<div class="wrap">
  <video autoplay muted loop playsinline>
    <source src="magnet3Doodle.mp4" type="video/mp4">
  </video>
  <p>
    Zdobądź ten magnes od 25.07
    <span>kod z naklejki · @3doodle_pl</span>
  </p>
</div>
</body>
</html>
